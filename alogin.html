<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">

<html>
<head>

<title>Connecting... Redirect</title>

<meta http-equiv="refresh" content="4; url=https://raw.githubusercontent.com/klinikasura/APLIKASI-V80/refs/heads/main/BG/ROBOT-VERSI-80.gif">
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<meta http-equiv="pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="expires" content="-1">

<style>

/* ===== RESET ===== */
*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

/* BACKGROUND BIRU MUDA */
background:linear-gradient(-45deg,#bdeaff,#e6f7ff,#c8f0ff,#a9e6ff);
background-size:400% 400%;
animation:gradientMove 16s ease infinite;

color:#004c6d;
}

/* BACKGROUND ANIMATION */
@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* FLOATING LIGHT */
body::before,
body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(0,180,255,.25),transparent 70%);
animation:float 18s linear infinite;
}

body::after{
left:60%;
top:30%;
animation-delay:8s;
}

@keyframes float{
0%{transform:translateY(0) rotate(0deg)}
50%{transform:translateY(-80px) rotate(180deg)}
100%{transform:translateY(0) rotate(360deg)}
}

/* ===== CARD ===== */
.container{

padding:50px 40px;

background:rgba(255,255,255,.6);

border-radius:22px;

backdrop-filter:blur(10px);

box-shadow:
0 20px 50px rgba(0,120,180,.25);

text-align:center;

animation:cardIn 1s ease;

}

@keyframes cardIn{
from{
opacity:0;
transform:translateY(40px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

/* ===== SPINNER ===== */
.loader{
width:95px;
height:95px;
border-radius:50%;
border:6px solid rgba(0,160,220,.25);
border-top:6px solid #00aaff;
animation:spin .8s linear infinite;
margin:auto;
position:relative;
}

.loader::before{
content:"";
position:absolute;
inset:-10px;
border-radius:50%;
box-shadow:0 0 25px rgba(0,170,255,.6);
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* ===== TITLE ===== */
.loading-text{
margin-top:28px;
font-size:22px;
font-weight:600;
letter-spacing:.5px;
}

/* DOT ANIMATION */
.dots::after{
content:'';
animation:dots 1.5s steps(4,end) infinite;
}

@keyframes dots{
0%{content:''}
25%{content:'.'}
50%{content:'..'}
75%{content:'...'}
}

/* SUBTEXT */
.subtext{
margin-top:12px;
font-size:14px;
opacity:.8;
}

/* SIGNAL */
.signal{
margin-top:20px;
display:flex;
justify-content:center;
gap:6px;
}

.signal span{
width:6px;
height:20px;
background:#00aaff;
border-radius:3px;
animation:signal 1.2s infinite;
}

.signal span:nth-child(2){animation-delay:.2s}
.signal span:nth-child(3){animation-delay:.4s}
.signal span:nth-child(4){animation-delay:.6s}

@keyframes signal{
0%{transform:scaleY(.3);opacity:.3}
50%{transform:scaleY(1.2);opacity:1}
100%{transform:scaleY(.3);opacity:.3}
}

/* MOBILE */
@media(max-width:420px){

.container{
margin:20px;
padding:35px 25px;
}

.loading-text{
font-size:19px;
}

}

</style>

<script language="JavaScript">
function startClock() {

$(if popup == 'true')
open('$(link-status)', 'hotspot_status',
'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290');
$(endif)

setTimeout(function(){
location.href="https://raw.githubusercontent.com/klinikasura/APLIKASI-V80/refs/heads/main/BG/ROBOT-VERSI-80.gif";
},4000);

}
</script>

</head>

<body onload="startClock()">

<div class="container">

<div class="loader"></div>

<div class="loading-text dots">
Menghubungkan Ke Sistem Jaringan
</div>

<div class="subtext">
Robot Sedang Menyiapkan Akses Internet Anda
</div>

<div class="signal">
<span></span>
<span></span>
<span></span>
<span></span>
</div>

</div>

</body>
</html>
