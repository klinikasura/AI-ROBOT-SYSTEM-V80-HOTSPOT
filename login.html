<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8">
<title>Login Hotspot</title>

<meta http-equiv="pragma" content="no-cache"/>
<meta http-equiv="expires" content="-1"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

/* ===== RESET ===== */
*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

/* ===== BACKGROUND BIRU MUDA ===== */
body.login{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
background:linear-gradient(135deg,#b9e6ff,#e3f6ff,#b9e6ff);
}

/* EFEK CAHAYA */
body.login::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,.6),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,180,255,.25),transparent 40%),
radial-gradient(circle at 50% 90%,rgba(0,200,255,.25),transparent 40%);
animation:moveBg 20s linear infinite;
}

@keyframes moveBg{
0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}
}

/* ===== LOGIN CARD ===== */
.vertical-form{
width:100%;
max-width:360px;
padding:38px 28px;
border-radius:18px;
background:rgba(255,255,255,.65);
border:1px solid rgba(255,255,255,.8);
backdrop-filter:blur(8px);
box-shadow:0 15px 40px rgba(0,0,0,.15);
color:#333;
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(25px)}
to{opacity:1; transform:translateY(0)}
}

/* TITLE */
legend{
font-size:24px;
font-weight:600;
text-align:center;
margin-bottom:22px;
letter-spacing:.5px;
color:#0072ff;
}

/* INPUT */
.vertical-form input.text,
.vertical-form input.password{
width:100%;
padding:14px 15px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #d8ecff;
outline:none;
font-size:15px;
background:white;
transition:box-shadow .15s ease,border .15s ease;
}

.vertical-form input::placeholder{
color:#888;
}

.vertical-form input:focus{
border:1px solid #00aaff;
box-shadow:0 0 0 2px rgba(0,170,255,.2);
}

/* BUTTON */
.vertical-form input[type="submit"]{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00c6ff,#0099ff);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.vertical-form input[type="submit"]:hover{
box-shadow:0 6px 20px rgba(0,150,255,.4);
}

/* FOOTER */
.footer{
margin-top:18px;
font-size:12px;
text-align:center;
opacity:.8;
}

/* RESPONSIVE */
@media(max-width:420px){
.vertical-form{
margin:14px;
padding:26px 20px;
}
}

</style>

</head>

<body class="login">

$(if chap-id)

<form name="sendin" action="$(link-login-only)" method="post">
<input type="hidden" name="username"/>
<input type="hidden" name="password"/>
<input type="hidden" name="dst" value="$(link-orig)"/>
<input type="hidden" name="popup" value="true"/>
</form>

<script src="/md5.js"></script>

<script>
function doLogin(){
document.sendin.username.value=document.login.username.value;
document.sendin.password.value=
hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
document.sendin.submit();
return false;
}
</script>

$(endif)

<form class="vertical-form" name="login" action="$(link-login-only)" method="post"
$(if chap-id) onsubmit="return doLogin()" $(endif)>

<legend>myROBOT-V80</legend>

<input type="hidden" name="dst" value="$(link-orig)"/>
<input type="hidden" name="popup" value="true"/>

<input name="username" class="text" type="text"
value="$(username)" placeholder="Username" required/>

<input name="password" class="password" type="text"
placeholder="Password" required/>

<input type="submit" value="Login">

<div class="footer">
© Versi 8.0
</div>

</form>

<script>
document.login.username.focus();
document.oncontextmenu=function(){return false;}
</script>

</body>
</html>
