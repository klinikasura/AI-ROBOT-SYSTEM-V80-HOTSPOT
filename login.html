<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>myROBOT-V80 Hotspot</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===== RESET ===== */
*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

/* ===== BACKGROUND ===== */
body.login{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0c1b2a;
overflow:hidden;
color:white;
}

/* ===== PARTICLE CANVAS ===== */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* ===== LOGIN BOX ===== */
.vertical-form{

position:relative;
z-index:2;

width:100%;
max-width:360px;

padding:35px;

border-radius:20px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 0 40px rgba(0,150,255,.2);

text-align:center;
}

/* TITLE */
legend{
font-size:26px;
margin-bottom:20px;
font-weight:bold;
color:#00c3ff;
}

/* ===== INPUT USERNAME PASSWORD ===== */

.vertical-form input.text,
.vertical-form input.password{

width:100%;
padding:14px;

margin-bottom:14px;

border-radius:12px;

border:1px solid #a8e4ff;

outline:none;

background:#f4fbff;

color:#003344;

font-size:16px;

transition:0.25s;

}

/* placeholder */
.vertical-form input::placeholder{
color:#6aa6c8;
}

/* focus */
.vertical-form input:focus{

background:white;

border:1px solid #00c3ff;

box-shadow:0 0 10px rgba(0,195,255,0.4);

}

/* ===== LOGIN BUTTON NEON ===== */

.vertical-form input[type="submit"]{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:#00c3ff;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

box-shadow:
0 0 10px #00c3ff,
0 0 20px #00c3ff,
0 0 40px #00c3ff;

transition:.3s;

}

.vertical-form input[type="submit"]:hover{

box-shadow:
0 0 20px #00e1ff,
0 0 40px #00e1ff,
0 0 60px #00e1ff;

transform:scale(1.03);

}

/* SIGNAL */
.signal{
margin-top:10px;
font-size:18px;
color:#00ff9c;
}

/* DEVICE */
.device{
margin-top:10px;
font-size:12px;
opacity:.85;
}

/* FOOTER */
.footer{
margin-top:20px;
font-size:12px;
opacity:.7;
}

</style>
</head>

<body class="login">

<canvas id="particles"></canvas>

$(if chap-id)

<form name="sendin" action="$(link-login-only)" method="post">

<input type="hidden" name="username">
<input type="hidden" name="password">

<input type="hidden" name="dst" value="$(link-orig)">
<input type="hidden" name="popup" value="true">

</form>

<script src="/md5.js"></script>

<script>

function doLogin(){

document.sendin.username.value=document.login.username.value;

document.sendin.password.value=
hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');

document.sendin.submit();

return false;

}

</script>

$(endif)

<form class="vertical-form" name="login" action="$(link-login-only)" method="post"
$(if chap-id) onsubmit="return doLogin()" $(endif)>

<legend>myROBOT-V80</legend>

<input type="hidden" name="dst" value="$(link-orig)">
<input type="hidden" name="popup" value="true">

<input name="username" class="text" type="text"
placeholder="Username" required>

<input name="password" class="password" type="text"
placeholder="Password" required>

<input type="submit" value="Login Hotspot">

<div class="signal">
📶 Signal Hotspot Aktif
</div>

<div class="device" id="device">
Mendeteksi perangkat...
</div>

<div class="footer">
© Versi 8.0
</div>

</form>

<script>

/* ===== DEVICE DETECT ===== */

var ua=navigator.userAgent;
var device="Desktop";

if(/android/i.test(ua)){device="Android";}
if(/iPhone|iPad|iPod/i.test(ua)){device="iPhone / iOS";}

document.getElementById("device").innerHTML=
"Perangkat: "+device;

/* ===== PARTICLE BACKGROUND ===== */

var canvas=document.getElementById("particles");
var ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

var particles=[];

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00c3ff";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

});

update();

}

function update(){

particles.forEach(p=>{

p.y+=p.d;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}

});

}

setInterval(draw,30);

</script>

</body>
</html>
